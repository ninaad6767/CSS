<html>

<head>

<title>Bootstrap Grid System</title>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

</script>


</head>
<body>

    <div class="container">
        <h1> hello student</h1>
        <p>Resize the browser window to see the effect.</p>
        <div class="row">
            <div class="col-md-8 col-xs-4" style="background-color:rgb(98, 0, 255); border: 1px solid black;">Medium and Extra small screen </div>

<div class="col-md-1 col-xs-1" style="background-color:rgb(250, 230, 230);">Extra small, Medium screen </div>
            <div class="col-md-12 col-xs-5" style="background-color:rgba(74, 0, 248, 0.603);">Extra small, Medium screen </div>
        </div>
        <div class="row">
            <div class="col-md-1 col-xs-5" style="background-color:lavender;">Extra small, Medium screen </div>
        </div>
            <div class="col-md-12 col-xs-5" style="background-color:rgba(248, 0, 0, 0.603);">Extra small, Medium screen </div>
<div class="col-md-12 col-xs-5" style="background-color:rgba(235, 250, 230, 0.301);">Extra small, Medium screen </div>
    </div>
</body>
</html>
